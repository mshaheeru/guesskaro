<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>جھٹ پٹ — Jhat Pat</title>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #0D0D1A;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Poppins', sans-serif;
      overflow: hidden;
    }

    /* Phone shell */
    #phone-shell {
      width: 390px;
      height: 844px;
      border-radius: 48px;
      background: #1A1A2E;
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.08),
        0 0 0 10px #111,
        0 0 0 12px #222,
        0 30px 80px rgba(0,0,0,0.7),
        0 0 60px rgba(255,107,53,0.08);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Status bar */
    #status-bar {
      flex-shrink: 0;
      height: 44px;
      background: rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: relative;
      z-index: 50;
    }
    #status-bar .time {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 15px;
      color: #fff;
      direction: ltr;
    }
    #status-bar .icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #status-bar .icons svg { fill: #fff; }

    /* Dynamic island */
    #notch {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 34px;
      background: #000;
      border-radius: 20px;
      z-index: 60;
    }

    /* App container */
    #app-root {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* Home indicator */
    #home-indicator {
      flex-shrink: 0;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.2);
    }
    #home-indicator div {
      width: 120px;
      height: 5px;
      border-radius: 3px;
      background: rgba(255,255,255,0.25);
    }

    /* Page background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(255,107,53,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(15,52,96,0.3) 0%, transparent 50%);
      pointer-events: none;
    }

    /* Screen labels (for desktop) */
    #screen-info {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15,52,96,0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,107,53,0.3);
      border-radius: 20px;
      padding: 8px 20px;
      color: rgba(255,255,255,0.7);
      font-family: 'Poppins', sans-serif;
      font-size: 12px;
      white-space: nowrap;
      z-index: 1000;
    }

    /* Nav pill above phone */
    #quick-nav {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      background: rgba(15,52,96,0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,107,53,0.25);
      border-radius: 24px;
      padding: 8px 12px;
      z-index: 1000;
    }
    #quick-nav button {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-family: 'Poppins', sans-serif;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 12px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    #quick-nav button:hover,
    #quick-nav button.active {
      background: rgba(255,107,53,0.2);
      color: #FF6B35;
    }
  </style>
</head>
<body>

<!-- Quick nav for prototype jumping -->
<div id="quick-nav">
  <button onclick="jumpTo('splash')">Splash</button>
  <button onclick="jumpTo('onboarding')">Onboard</button>
  <button onclick="jumpTo('signin')">Sign In</button>
  <button onclick="jumpTo('home')">Home</button>
  <button onclick="jumpTo('photo')">Game</button>
  <button onclick="jumpTo('library')">Library</button>
  <button onclick="jumpTo('profile')">Profile</button>
  <button onclick="jumpTo('settings')">Settings</button>
</div>

<div id="phone-shell">
  <!-- Status bar -->
  <div id="status-bar">
    <div id="notch"></div>
    <span class="time" id="clock">9:41</span>
    <div class="icons">
      <!-- Signal -->
      <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
      <!-- Wifi -->
      <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 9.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3zM1.5 4.5C3.6 2.4 6.2 1 8 1s4.4 1.4 6.5 3.5" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/><path d="M4 7C5.3 5.8 6.6 5 8 5s2.7.8 4 2" stroke="#fff" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      <!-- Battery -->
      <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="21" height="10" rx="2.5" stroke="#fff" stroke-width="1.2" fill="none"/><rect x="1.5" y="2.5" width="17" height="7" rx="1.5" fill="#fff"/><path d="M22 4v4" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
    </div>
  </div>

  <!-- React app mounts here -->
  <div id="app-root"></div>

  <!-- Home indicator -->
  <div id="home-indicator"><div></div></div>
</div>

<div id="screen-info">Tap the nav above to jump between screens</div>

<script type="text/babel" src="jhatpat-components.jsx"></script>
<script type="text/babel" src="jhatpat-screens.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;

  // Clock update
  function updateClock() {
    const now = new Date();
    const h = now.getHours() % 12 || 12;
    const m = String(now.getMinutes()).padStart(2,'0');
    const el = document.getElementById('clock');
    if (el) el.textContent = `${h}:${m}`;
  }
  updateClock();
  setInterval(updateClock, 10000);

  // Global jump fn — calls into React
  window._jumpFn = null;
  window.jumpTo = (screen) => {
    if (window._jumpFn) window._jumpFn(screen);
    document.querySelectorAll('#quick-nav button').forEach(b => {
      b.classList.toggle('active', b.textContent.toLowerCase().includes(screen.slice(0,4).toLowerCase()));
    });
  };

  // TWEAK DEFAULTS
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "accentColor": "#FF6B35",
    "bgColor": "#1A1A2E",
    "cardBg": "#16213E",
    "urduFontSize": 18,
    "timerSeconds": 15,
    "showStreaks": true
  }/*EDITMODE-END*/;

  function AppWrapper() {
    const [screen, setScreen] = useState('splash');
    const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
    const [gameState, setGameState] = useState(null);
    const [activeTab, setActiveTab] = useState('home');

    const [profile] = useState({
      name: 'Shaheer',
      avatar: '😊',
      level: 3,
      levelTitle: 'پکا شاگرد',
      xp: 340,
      xpNext: 500,
      xpPct: 0.68,
      streak: 5,
      bestStreak: 8,
      coins: 50,
      todayCards: 2,
    });

    // Expose jump function
    useEffect(() => {
      window._jumpFn = (s) => {
        if (s === 'photo' || s === 'game') {
          const PHRASES = window._PHRASES || [];
          setGameState({
            mode: 'quick', cardIdx: 0, totalCards: 5,
            results: [], streak: 3, coins: 50,
            phase: 'photo', eliminated: false,
          });
          setScreen('photo');
        } else {
          setScreen(s);
          if (['home','library','profile'].includes(s)) setActiveTab(s);
        }
      };
    }, []);

    // Update CSS vars from tweaks
    useEffect(() => {
      document.documentElement.style.setProperty('--jp-orange', tweaks.accentColor);
    }, [tweaks.accentColor]);

    const PHRASES = [
      { id:1, urdu:'طوطے اڑ جانا', roman:'Totay ur jana', meaning:'حیران و پریشان رہ جانا', example:'جب اسے خبر ملی تو اس کے طوطے اڑ گئے', category:'محاورہ', difficulty:'آسان', wrong:['بہت خوش ہو جانا','تیز دوڑنا','کسی کو دھوکہ دینا'] },
      { id:2, urdu:'کان کھڑے ہونا', roman:'Kaan kharay hona', meaning:'چوکنا یا ہوشیار ہو جانا', example:'مشکوک آواز سنتے ہی اس کے کان کھڑے ہو گئے', category:'محاورہ', difficulty:'آسان', wrong:['سننے میں دشواری محسوس کرنا','کسی کی چغلی کھانا','بہت تیز آواز سن کر کان بند کر لینا'] },
      { id:3, urdu:'باغ باغ ہونا', roman:'Bagh bagh hona', meaning:'انتہائی خوش اور مسرور ہونا', example:'خوشخبری سن کر وہ باغ باغ ہو گئے', category:'محاورہ', difficulty:'آسان', wrong:['بہت غصہ آنا','چوری کرنا','گم ہو جانا'] },
      { id:4, urdu:'آگ بگولہ ہونا', roman:'Aag bagola hona', meaning:'بہت زیادہ غصے میں آ جانا', example:'بات سن کر وہ آگ بگولہ ہو گیا', category:'محاورہ', difficulty:'آسان', wrong:['بہت خوش ہونا','حیران ہو جانا','تیز چلنا'] },
      { id:5, urdu:'دانتوں تلے انگلی دبانا', roman:'Danton talay ungli dabana', meaning:'بہت زیادہ حیران ہونا', example:'اس کا کام دیکھ کر سب نے دانتوں تلے انگلی دبا لی', category:'محاورہ', difficulty:'درمیانہ', wrong:['بہت تھکا ہوا ہونا','چھپ جانا','فرار ہو جانا'] },
    ];
    window._PHRASES = PHRASES;

    function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

    const startGame = (mode) => {
      setGameState({ mode, cardIdx: 0, totalCards: PHRASES.length, results: [], streak: 0, coins: profile.coins, eliminated: false });
      setScreen('photo');
    };

    const handlePhotoAnswer = (correct, pts) => {
      const newStreak = correct ? gameState.streak + 1 : 0;
      setGameState(g => ({ ...g, pendingCorrect: correct, pendingPts: pts, streak: newStreak }));
      setScreen('resultFlash');
    };

    const handleMeaningAnswer = (correct, pts) => {
      const phrase = PHRASES[gameState.cardIdx];
      const newResults = [...gameState.results, { urdu: phrase.urdu, correct: gameState.pendingCorrect && correct, pts: (gameState.pendingPts || 0) + pts }];
      const newCardIdx = gameState.cardIdx + 1;
      if (newCardIdx >= PHRASES.length) {
        setGameState(g => ({ ...g, results: newResults, cardIdx: newCardIdx }));
        setScreen('summary');
      } else {
        setGameState(g => ({ ...g, results: newResults, cardIdx: newCardIdx, pendingCorrect: null, pendingPts: 0, eliminated: false }));
        setScreen('photo');
      }
    };

    const handleNavigate = (tab) => {
      setActiveTab(tab);
      setScreen(tab);
    };

    const showBottomNav = ['home','library','profile'].includes(screen);
    const currentPhrase = gameState ? PHRASES[Math.min(gameState.cardIdx, PHRASES.length - 1)] : null;

    // Update screen info label
    useEffect(() => {
      const labels = { splash:'1 — Splash', onboarding:'2 — Onboarding', signin:'3 — Sign In', home:'4 — Home', photo:'5 — Photo Card', resultFlash:'6 — Result Flash', reveal:'7 — Reveal Card', meaningQuiz:'7b — Meaning Quiz', summary:'8 — Session Summary', library:'9 — Phrase Library', profile:'10 — Profile', settings:'11 — Settings' };
      const el = document.getElementById('screen-info');
      if (el) el.textContent = `Screen ${labels[screen] || screen}`;
    }, [screen]);

    return (
      <div style={{ display:'flex', flexDirection:'column', height:'100%', position:'relative', overflow:'hidden', background: tweaks.bgColor }}>

        {screen === 'splash' && <SplashScreen onDone={() => setScreen('onboarding')} />}
        {screen === 'onboarding' && <OnboardingScreen onDone={() => setScreen('signin')} />}
        {screen === 'signin' && <SignInScreen onDone={(name, av) => setScreen('home')} />}
        {screen === 'home' && <HomeScreen profile={profile} onNavigate={handleNavigate} onStartGame={startGame} />}
        {screen === 'library' && <LibraryScreen />}
        {screen === 'profile' && <ProfileScreen profile={profile} />}
        {screen === 'settings' && <SettingsScreen />}

        {screen === 'photo' && currentPhrase && (
          <PhotoCardScreen
            key={`photo-${gameState.cardIdx}`}
            cardIdx={gameState.cardIdx + 1}
            totalCards={gameState.totalCards}
            phrase={currentPhrase}
            streak={gameState.streak}
            coins={gameState.coins}
            onAnswer={handlePhotoAnswer}
            onHintEliminate={() => setGameState(g => ({...g, eliminated: true, coins: g.coins - 10}))}
            onHintFreeze={() => setGameState(g => ({...g, coins: g.coins - 15}))}
            eliminated={gameState.eliminated}
          />
        )}
        {screen === 'resultFlash' && gameState && (
          <ResultFlashScreen
            correct={gameState.pendingCorrect}
            points={gameState.pendingPts}
            streak={gameState.streak}
            onDone={() => setScreen('reveal')}
          />
        )}
        {screen === 'reveal' && currentPhrase && (
          <RevealCardScreen
            phrase={currentPhrase}
            cardIdx={gameState.cardIdx + 1}
            totalCards={gameState.totalCards}
            onStartMeaning={() => setScreen('meaningQuiz')}
            isLast={gameState.cardIdx === PHRASES.length - 1}
          />
        )}
        {screen === 'meaningQuiz' && currentPhrase && (
          <MeaningQuizScreen
            key={`meaning-${gameState.cardIdx}`}
            phrase={currentPhrase}
            cardIdx={gameState.cardIdx + 1}
            totalCards={gameState.totalCards}
            onAnswer={handleMeaningAnswer}
          />
        )}
        {screen === 'summary' && gameState && (
          <SessionSummaryScreen
            results={gameState.results}
            profile={profile}
            onPlayAgain={() => startGame(gameState.mode)}
            onHome={() => { setScreen('home'); setActiveTab('home'); }}
          />
        )}

        {showBottomNav && <BottomNav active={screen} onNavigate={handleNavigate} />}

        {/* Settings gear on home */}
        {screen === 'home' && (
          <div
            onClick={() => setScreen('settings')}
            style={{ position:'absolute', top:18, right:20, width:36, height:36, borderRadius:10, background:'rgba(255,255,255,0.06)', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', zIndex:20 }}
          >
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
              <path d="M9 11.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z" stroke="#8892A4" strokeWidth="1.5"/>
              <path d="M14.2 6.8l.5-.9a.9.9 0 00-.3-1.2l-1-.6a.9.9 0 00-1.2.3l-.5.9A5 5 0 009 4.7V3.8A.9.9 0 008.1 3h-1.2A.9.9 0 006 3.8v1a5 5 0 00-2.7 1.6l-.5-.9A.9.9 0 001.6 5.1l-1 .6a.9.9 0 00-.3 1.2l.5.9A5 5 0 00.7 9a5 5 0 00.1 1.2l-.5.9a.9.9 0 00.3 1.2l1 .6a.9.9 0 001.2-.3l.5-.9A5 5 0 006 13.3v1A.9.9 0 006.9 15h1.2a.9.9 0 00.9-.9v-1a5 5 0 002.7-1.6l.5.9a.9.9 0 001.2.3l1-.6a.9.9 0 00.3-1.2l-.5-.9A5 5 0 0015.3 9a5 5 0 00-.1-1.2z" stroke="#8892A4" strokeWidth="1.5"/>
            </svg>
          </div>
        )}

        {/* Tweaks panel */}
        <TweaksPanel tweaks={tweaks} setTweak={setTweak}>
          <TweakSection title="Brand">
            <TweakColor id="accentColor" label="Accent Color" />
            <TweakColor id="bgColor" label="Background" />
            <TweakColor id="cardBg" label="Card Background" />
          </TweakSection>
          <TweakSection title="Typography">
            <TweakSlider id="urduFontSize" label="Urdu Font Size" min={14} max={26} step={1} />
          </TweakSection>
          <TweakSection title="Gameplay">
            <TweakSlider id="timerSeconds" label="Timer (seconds)" min={8} max={30} step={1} />
            <TweakToggle id="showStreaks" label="Show Streak Badges" />
          </TweakSection>
          <TweakSection title="Quick Jump">
            <TweakButton label="→ Splash" onClick={() => setScreen('splash')} />
            <TweakButton label="→ Game" onClick={() => { startGame('quick'); }} />
            <TweakButton label="→ Summary" onClick={() => { setGameState(g => g ? {...g, results:[{urdu:'طوطے اڑ جانا',correct:true,pts:500},{urdu:'کان کھڑے ہونا',correct:false,pts:0},{urdu:'باغ باغ ہونا',correct:true,pts:300}], cardIdx:5} : null); setScreen('summary'); }} />
          </TweakSection>
        </TweaksPanel>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('app-root')).render(<AppWrapper />);
</script>
</body>
</html>
